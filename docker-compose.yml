services:

  # ─── IDENTITY SERVER (Free Cognito Alternative) ──────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres123
      # Allow plain HTTP for local development (fixes "HTTPS required" error)
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY: edge
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - mcp-network

  # ─── BACKEND (Python + FastAPI) ──────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres123@postgres:5432/appdb
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: http://localhost:8080
      KEYCLOAK_REALM: mcp-platform
      KEYCLOAK_FRONTEND_CLIENT_ID: mcp-frontend
      FRONTEND_URL: http://localhost:3000
      FRONTEND_OAUTH_CALLBACK_URL: http://localhost:3000/auth/callback
      GATEWAY_PUBLIC_URL: http://localhost:8000
      DOCKER_NETWORK: mcp-platform-network
      ALLOW_DIRECT_GOOGLE_TOKENS: "true"
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: http://localhost:3000/auth/google/callback
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      GITHUB_OAUTH_REDIRECT_URI: http://localhost:3000/auth/github/callback
      GITHUB_TOKEN_ENCRYPTION_SECRET: change-this-local-dev-secret
    depends_on:
      - postgres
      - redis
      - keycloak
    volumes:
      - ./backend:/app
      - ${HOME}/.docker/run/docker.sock:/var/run/docker.sock
    networks:
      - mcp-network

  # ─── FRONTEND (Next.js) ──────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
      NEXT_PUBLIC_KEYCLOAK_REALM: mcp-platform
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: mcp-frontend
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - mcp-network

  # ─── DATABASE ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres123
      POSTGRES_USER: postgres
      POSTGRES_MULTIPLE_DATABASES: appdb,keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - mcp-network

  # ─── CACHE + SESSION STORE ───────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mcp-network

  # ─── FILE STORAGE (Free S3 Alternative) ─────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9002:9000" # S3 API — mapped to 9002 on host to avoid port conflicts
      - "9001:9001" # MinIO Dashboard UI
    volumes:
      - minio_data:/data
    networks:
      - mcp-network

networks:
  mcp-network:
    name: mcp-platform-network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
